    <!-- Load the YouTube Iframe Player API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        const VIDEO_ID = 'LzbwdZlIX94';

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('coachVideo', {
                videoId: VIDEO_ID,
                playerVars: {
                    'playsinline': 1,
                    'rel': 0,
                    'autoplay': 0, // CHANGED: Does not play automatically on load
                    'theme': 'dark',
                    'color': 'white'
                }
            });
        }

        function jumpTo(start, stop = null) {
            if (player && typeof player.cueVideoById === 'function') {
                const options = {
                    videoId: VIDEO_ID,
                    startSeconds: start
                };
                
                if (stop !== null) {
                    options.endSeconds = stop;
                }

                player.cueVideoById(options);
                
                // Slight delay ensures the new source parameters commit before playing
                setTimeout(() => {
                    player.playVideo();
                }, 150); 
            } else {
                console.error("YouTube Player is not ready yet.");
            }
        }

        // Native JavaScript Draggable & Onload Setup
        document.addEventListener("DOMContentLoaded", () => {
            // Trigger the onload notification pop-up
            alert("Click the links below to see live examples of communication on the ice!");

            const modal = document.getElementById("draggableModal");
            const handle = modal.querySelector(".modal-handle");
            
            let isDragging = false;
            let offsetX, offsetY;

            handle.addEventListener("mousedown", (e) => {
                isDragging = true;
                offsetX = e.clientX - modal.getBoundingClientRect().left;
                offsetY = e.clientY - modal.getBoundingClientRect().top;
                
                // Disables iframe pointer tracking conflicts during window drag movements
                document.getElementById("coachVideo").style.pointerEvents = "none";
                
                document.addEventListener("mousemove", mouseMoveHandler);
                document.addEventListener("mouseup", mouseUpHandler);
            });

            function mouseMoveHandler(e) {
                if (!isDragging) return;
                
                let newLeft = e.clientX - offsetX;
                let newTop = e.clientY - offsetY;
                
                modal.style.left = newLeft + "px";
                modal.style.top = newTop + "px";
                modal.style.right = "auto"; 
            }

            function mouseUpHandler() {
                isDragging = false;
                document.getElementById("coachVideo").style.pointerEvents = "auto";
                document.removeEventListener("mousemove", mouseMoveHandler);
                document.removeEventListener("mouseup", mouseUpHandler);
            }
        });
    </script>
