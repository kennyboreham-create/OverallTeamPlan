<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hockey Video Portal</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #0b0f19; 
            color: #e2e8f0; 
            padding: 20px; 
            margin: 0;
        }
        header { 
            background: #141b2d; 
            padding: 20px; 
            border-radius: 8px; 
            text-align: center; 
            border: 1px solid #1e293b;
        }
        h1 { color: #ffffff; margin: 0; }
        .role-badge { color: #38bdf8; font-weight: bold; font-size: 1.2rem; margin-top: 5px;}
        
        .main-section { 
            background: #101726; 
            margin-top: 25px; 
            padding: 20px; 
            border-radius: 10px; 
            border: 2px solid #1e293b;
        }
        .main-section h2 { color: #ffffff; border-bottom: 2px solid #38bdf8; padding-bottom: 5px; text-transform: uppercase; }
        
        .subsection { 
            background: #141b2d; 
            margin: 15px 0; 
            padding: 15px; 
            border-radius: 6px; 
            border: 1px solid #2e3d5c;
        }
        .subsection h2 { color: #38bdf8; font-size: 1.3rem; border: none; margin: 0 0 10px 0; }
        
        .video-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin: 8px 0; 
            flex-wrap: wrap;
        }
        .video-item h3 { margin: 0; font-size: 1.1rem; font-weight: normal; }
        
        a { color: #38bdf8; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        
        .assigned-tag { 
            background: #ef4444; 
            color: white; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 0.8rem; 
            font-weight: bold; 
        }
        
        /* Coach Controls */
        .coach-controls { display: none; }
        button { 
            background: #1e293b; 
            color: #38bdf8; 
            border: 1px solid #38bdf8; 
            padding: 5px 10px; 
            border-radius: 4px; 
            cursor: pointer; 
        }
        button:hover { background: #38bdf8; color: #0b0f19; }
        button.delete-btn { border-color: #ef4444; color: #ef4444; }
        button.delete-btn:hover { background: #ef4444; color: white; }
        
        .add-form { 
            margin-top: 10px; 
            display: flex; 
            gap: 10px; 
        }
        input { 
            background: #0b0f19; 
            border: 1px solid #2e3d5c; 
            color: white; 
            padding: 5px; 
            border-radius: 4px; 
        }
    </style>
</head>
<body>

    <header>
        <h1>🏒 Team Video Strategy Hub 🏒</h1>
        <div id="userRow" class="role-badge">Connecting...</div>
    </header>

    <main id="portalStructure">
        <!-- Structural Sections defined via JavaScript layout structure templates below -->
    </main>

    <script>
        // --- GLOBAL SETTINGS ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx2YRS6_3nxE3ucDd59ZlWBo6rHbGpgxA__hhDquiCW4FRNirdNR8nUTzt5A_-eihEXCw/exec";
        const VALID_JERSEYS = [9, 3, 36, 5, 74, 19, 18, 13, 31, 16, 8, 10, 12];
        const SYSTEM_ARCHITECTURE = {
            "Possession": ["breakouts", "regroups", "o-zone"],
            "Pressure": ["forecheck", "backcheck", "d-zone"],
            "Battle": ["loose puck", "50/50 battles", "other times to attack"]
        };

        // --- STATE MANAGEMENT ---
        let sessionUser = { role: null, id: null };
        let cachedVideos = [];
        let cachedRoster = [];
        let cachedAssignments = [];

        window.addEventListener("DOMContentLoaded", initializePortal);

        function initializePortal() {
            let promptActive = true;
            let userId = null;

            while (promptActive) {
                let input = prompt("Please enter your Player Jersey Number or Coach Access ID:");
                if (!input) continue;
                
                userId = parseInt(input.trim());
                // Valid checks: Either it's an explicitly allowed player jersey, or a 5-digit number (Coach)
                if (VALID_JERSEYS.includes(userId) || (userId.toString().length === 5)) {
                    promptActive = false;
                } else {
                    alert("ID or Jersey number not verified on the active team roster. Try again!");
                }
            }

            // --- COMPLETE TROUBLESHOOTING & DEBUGGING WRAPPER ---
            function fetchFromDatabase(action, payloads, callback) {
                console.log(`%c[DEBUG] 🚀 Starting database request for action: "${action}"`, "color: #38bdf8; font-weight: bold;");
                
                payloads.action = action;
                
                // Construct the query string
                const queryString = Object.keys(payloads)
                    .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(payloads[key]))
                    .join('&');
                    
                const finalUrl = `${WEB_APP_URL}?${queryString}`;
                
                console.log(`%c[DEBUG] 🔗 Attempting to ping URL:\n${finalUrl}`, "color: #94a3b8;");

                // Start the network fetch timer
                const startTime = performance.now();

                fetch(finalUrl)
                    .then(response => {
                        const duration = (performance.now() - startTime).toFixed(2);
                        console.log(`%c[DEBUG] 📡 Server responded in ${duration}ms. Status code: ${response.status} (${response.statusText})`, "color: #22c55e; font-weight: bold;");
                        
                        if (!response.ok) {
                            throw new Error(`HTTP Error Status: ${response.status}`);
                        }
                        return response.json();
                    })
                    .then(data => {
                        console.log("%c[DEBUG] 📦 Raw Data received from Google Sheet:", "color: #eab308; font-weight: bold;", data);
                        
                        if (data.success) {
                            console.log(`%c[DEBUG] ✅ Connection successful! Executing UI callback.`, "color: #22c55e;");
                            if (callback) {
                                callback(data);
                            } else if (action !== "login") {
                                console.log(`%c[DEBUG] 🔄 Action "${action}" finished successfully. Refreshing page...`, "color: #a855f7;");
                                location.reload();
                            }
                        } else {
                            console.error(`%c[DEBUG] ❌ Google Script executed, but returned success = false. Error message: ${data.error}`, "color: #ef4444; font-weight: bold;");
                            alert(`Google Sheet Error: ${data.error}`);
                        }
                    })
                    .catch(err => {
                        console.error("%c[DEBUG] 🚨 CRITICAL CONNECTION FAILURE:", "color: #ef4444; font-weight: bold; font-size: 14px;", err);
                        console.log("%c[DEBUG] 👉 Tip: Check if your WEB_APP_URL is completely accurate and deployed as 'Anyone'.", "color: #38bdf8; font-style: italic;");
                        
                        // Fallback environment trigger
                        if(action === "login") {
                            console.log("%c[DEBUG] ⚠️ Triggering local mock fallback so page doesn't freeze completely.", "color: #f97316;");
                            callback({ success: true, role: payloads.id.toString().length === 5 ? "coach" : "player", videos: [], roster: [], assignments: [] });
                        }
                    });
            }

        // --- UI GENERATION ENGINE ---
        function renderPortalStructure() {
            const portal = document.getElementById("portalStructure");
            portal.innerHTML = ""; // Clear loader references

            for (const [section, subsections] of Object.entries(SYSTEM_ARCHITECTURE)) {
                let sectionDom = document.createElement("section");
                sectionDom.className = "main-section";
                sectionDom.innerHTML = `<h2>${section}</h2>`;

                subsections.forEach(sub => {
                    let subDom = document.createElement("div");
                    subDom.className = "subsection";
                    subDom.innerHTML = `<h2>${sub.toUpperCase()}</h2>`;

                    // Filter and render videos bound to this specific category mapping
                    let targetedVideos = cachedVideos.filter(v => v.section === section && v.subsection === sub);
                    
                    targetedVideos.forEach(vid => {
                        let itemDom = document.createElement("div");
                        itemDom.className = "video-item";
                        
                        // Setup h3 structure containing link referencing videoUrl directly
                        let hasAssignment = cachedAssignments.includes(vid.videoId);
                        itemDom.innerHTML = `
                            <h3>
                                <a href="${vid.youtubeUrl}" target="_blank" onclick="trackWatchEvent('${vid.videoId}')">
                                    🎬 ${vid.title}
                                </a>
                            </h3>
                            ${(sessionUser.role === 'player' && hasAssignment) ? `<span class="assigned-tag" id="tag-${vid.videoId}">ASSIGNED</span>` : ''}
                        `;

                        // If coach mode is enabled, add execution buttons
                        if (sessionUser.role === "coach") {
                            let ctrlWrapper = document.createElement("span");
                            ctrlWrapper.className = "coach-buttons";
                            ctrlWrapper.innerHTML = `
                                <button onclick="triggerAssignmentRoutine('${vid.videoId}')">Assign to Player</button>
                                <button class="delete-btn" onclick="executeSoftDelete('${vid.videoId}')">🗑️ Delete</button>
                            `;
                            itemDom.appendChild(ctrlWrapper);
                        }

                        subDom.appendChild(itemDom);
                    });

                    // Add content-addition panels inside specific channels for coaches
                    if (sessionUser.role === "coach") {
                        let addBox = document.createElement("div");
                        addBox.className = "add-form";
                        addBox.innerHTML = `
                            <input type="text" id="title-${section}-${sub}" placeholder="Video Title">
                            <input type="text" id="url-${section}-${sub}" placeholder="YouTube Link URL">
                            <button onclick="executeAddVideo('${section}', '${sub}')">＋ Save Video</button>
                        `;
                        subDom.appendChild(addBox);
                    }

                    sectionDom.appendChild(subDom);
                });

                portal.appendChild(sectionDom);
            }
        }

        // --- BACKEND ROUTING WRAPPER ---
        function fetchFromDatabase(action, payloads, callback) {
            payloads.action = action;
            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", // Bypasses browser strict script security for standalone HTML deployments
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payloads)
            })
            // no-cors limits internal inspection; handle state refreshes smoothly
            setTimeout(() => { if(action !== "login") location.reload(); }, 800); 
            if(callback && action === "login") {
                // For initial setup bypass no-cors restriction logic context if testing directly via mock setup hooks
                // Replace this block with typical deployment headers if hosted within full domain servers.
                fetch(WEB_APP_URL + "?action=get").then(res => res.json()).then(d => callback(d)).catch(()=> {
                   // Fallback logic for mock simulation purposes during deployment transitions
                   callback({ success: true, role: payloads.id.toString().length === 5 ? "coach" : "player", videos: [], roster: [], assignments: [] });
                });
            }
        }

        // --- ACTIONS ---
        function trackWatchEvent(videoId) {
            if (sessionUser.role === "player") {
                let playerNum = localStorage.getItem("jerseyNumber") || sessionUser.id;
                
                // Remove the dynamic assignment badge visually
                let tag = document.getElementById(`tag-${videoId}`);
                if (tag) tag.style.display = "none";

                fetchFromDatabase("watchVideo", { jersey: playerNum, videoId: videoId });
            }
        }

        function triggerAssignmentRoutine(videoId) {
            let options = cachedRoster.map(p => `#${p.jerseyNumber} - ${p.playerName}`).join("\n");
            let targetJersey = prompt(`Enter player jersey number to assign this clip:\n\nAvailable Roster:\n${options}`);
            
            if (targetJersey) {
                fetchFromDatabase("assignVideo", { jerseyNumber: parseInt(targetJersey), videoId: videoId });
                alert(`Video assigned successfully to player #${targetJersey}`);
            }
        }

        function executeAddVideo(sec, sub) {
            let titleVal = document.getElementById(`title-${sec}-${sub}`).value;
            let urlVal = document.getElementById(`url-${sec}-${sub}`).value;

            if (!titleVal || !urlVal) {
                alert("Both title box and link content components are required.");
                return;
            }
            fetchFromDatabase("addVideo", { section: sec, subsection: sub, title: titleVal, youtubeUrl: urlVal });
        }

        function executeSoftDelete(videoId) {
            if (confirm("Are you sure you want to remove this link from the player platform?")) {
                fetchFromDatabase("deleteVideo", { videoId: videoId });
            }
        }
    </script>
</body>
</html>
