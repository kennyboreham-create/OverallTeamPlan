<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hockey Video Portal</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #0b0f19; 
            color: #e2e8f0; 
            padding: 20px; 
            margin: 0;
        }
        header { 
            background: #141b2d; 
            padding: 20px; 
            border-radius: 8px; 
            text-align: center; 
            border: 1px solid #1e293b;
        }
        h1 { color: #ffffff; margin: 0; }
        .role-badge { color: #38bdf8; font-weight: bold; font-size: 1.2rem; margin-top: 5px;}
        
        .main-section { 
            background: #101726; 
            margin-top: 25px; 
            padding: 20px; 
            border-radius: 10px; 
            border: 2px solid #1e293b;
        }
        .main-section h2 { color: #ffffff; border-bottom: 2px solid #38bdf8; padding-bottom: 5px; text-transform: uppercase; }
        
        .subsection { 
            background: #141b2d; 
            margin: 15px 0; 
            padding: 15px; 
            border-radius: 6px; 
            border: 1px solid #2e3d5c;
        }
        .subsection h2 { color: #38bdf8; font-size: 1.3rem; border: none; margin: 0 0 10px 0; }
        
        .video-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin: 8px 0; 
            flex-wrap: wrap;
        }
        .video-item h3 { margin: 0; font-size: 1.1rem; font-weight: normal; }
        
        a { color: #38bdf8; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        
        .assigned-tag { 
            background: #ef4444; 
            color: white; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 0.8rem; 
            font-weight: bold; 
        }
        
        /* Coach Controls */
        .coach-controls { display: none; }
        button { 
            background: #1e293b; 
            color: #38bdf8; 
            border: 1px solid #38bdf8; 
            padding: 5px 10px; 
            border-radius: 4px; 
            cursor: pointer; 
        }
        button:hover { background: #38bdf8; color: #0b0f19; }
        button.delete-btn { border-color: #ef4444; color: #ef4444; }
        button.delete-btn:hover { background: #ef4444; color: white; }
        
        .add-form { 
            margin-top: 10px; 
            display: flex; 
            gap: 10px; 
        }
        input { 
            background: #0b0f19; 
            border: 1px solid #2e3d5c; 
            color: white; 
            padding: 5px; 
            border-radius: 4px; 
        }
    </style>
</head>
<body>

    <header>
        <h1>🏒 Team Video Strategy Hub 🏒</h1>
        <div id="userRow" class="role-badge">Connecting...</div>
    </header>

    <main id="portalStructure">
        <!-- Structural Sections defined via JavaScript layout structure templates below -->
    </main>

    <script>
        // --- GLOBAL SETTINGS ---
        const WEB_APP_URL = "YOUR_DEPLOYED_GOOGLE_APPS_SCRIPT_URL_HERE";
        const VALID_JERSEYS = [9, 3, 36, 5, 74, 19, 18, 13, 31, 16, 8, 10, 12];
        const SYSTEM_ARCHITECTURE = {
            "Possession": ["breakouts", "regroups", "o-zone"],
            "Pressure": ["forecheck", "backcheck", "d-zone"],
            "Battle": ["loose puck", "50/50 battles", "other times to attack"]
        };

        // --- STATE MANAGEMENT ---
        let sessionUser = { role: null, id: null };
        let cachedVideos = [];
        let cachedRoster = [];
        let cachedAssignments = [];

        window.addEventListener("DOMContentLoaded", initializePortal);

        function initializePortal() {
            let promptActive = true;
            let userId = null;

            while (promptActive) {
                let input = prompt("Please enter your Player Jersey Number or Coach Access ID:");
                if (!input) continue;
                
                userId = input.trim();
                let parsedId = parseInt(userId);
                
                if (VALID_JERSEYS.includes(parsedId) || (userId.length === 5)) {
                    promptActive = false;
                    userId = parsedId;
                } else {
                    alert("ID or Jersey number not verified on the active team roster. Try again!");
                }
            }

            // Authenticate and sync with Database
            fetchFromDatabase("login", { id: userId }, function(response) {
                if (response && response.success) {
                    sessionUser.role = response.role;
                    sessionUser.id = userId;
                    cachedVideos = response.videos || [];
                    
                    if (sessionUser.role === "coach") {
                        cachedRoster = response.roster || [];
                        document.getElementById("userRow").innerText = "Coach Dashboard | ID: " + userId;
                    } else {
                        cachedAssignments = response.assignments || [];
                        document.getElementById("userRow").innerText = "Player View | Jersey #" + userId;
                        localStorage.setItem("jerseyNumber", userId);
                    }
                    
                    renderPortalStructure();
                } else {
                    alert("Error syncing database profiles. Falling back to local display.");
                }
            });
        }

        // --- UI GENERATION ENGINE ---
        function renderPortalStructure() {
            const portal = document.getElementById("portalStructure");
            if (!portal) return;
            portal.innerHTML = ""; 

            for (const [section, subsections] of Object.entries(SYSTEM_ARCHITECTURE)) {
                let sectionDom = document.createElement("section");
                sectionDom.className = "main-section";
                sectionDom.innerHTML = "<h2>" + section + "</h2>";

                subsections.forEach(function(sub) {
                    let subDom = document.createElement("div");
                    subDom.className = "subsection";
                    subDom.innerHTML = "<h2>" + sub.toUpperCase() + "</h2>";

                    let targetedVideos = cachedVideos.filter(v => v.section === section && v.subsection === sub);
                    
                    targetedVideos.forEach(function(vid) {
                        let itemDom = document.createElement("div");
                        itemDom.className = "video-item";
                        
                        let hasAssignment = cachedAssignments.includes(vid.videoId);
                        
                        let playerTagHtml = "";
                        if (sessionUser.role === 'player' && hasAssignment) {
                            playerTagHtml = '<span class="assigned-tag" id="tag-' + vid.videoId + '">ASSIGNED</span>';
                        }

                        itemDom.innerHTML = `
                            <h3>
                                <a href="${vid.youtubeUrl}" target="_blank" onclick="trackWatchEvent('${vid.videoId}')">
                                    🎬 ${vid.title}
                                </a>
                            </h3>
                            ${playerTagHtml}
                        `;

                        if (sessionUser.role === "coach") {
                            let ctrlWrapper = document.createElement("span");
                            ctrlWrapper.className = "coach-buttons";
                            ctrlWrapper.innerHTML = `
                                <button onclick="triggerAssignmentRoutine('${vid.videoId}')">Assign to Player</button>
                                <button class="delete-btn" onclick="executeSoftDelete('${vid.videoId}')">🗑️ Delete</button>
                            `;
                            itemDom.appendChild(ctrlWrapper);
                        }

                        subDom.appendChild(itemDom);
                    });

                    if (sessionUser.role === "coach") {
                        let addBox = document.createElement("div");
                        addBox.className = "add-form";
                        // Using unique IDs matching category names perfectly
                        let textId = "title-" + section.replace(/\s+/g, '') + "-" + sub.replace(/\s+/g, '');
                        let urlId = "url-" + section.replace(/\s+/g, '') + "-" + sub.replace(/\s+/g, '');
                        
                        addBox.innerHTML = `
                            <input type="text" id="${textId}" placeholder="Video Title">
                            <input type="text" id="${urlId}" placeholder="YouTube Link URL">
                            <button onclick="executeAddVideo('${section}', '${sub}')">＋ Save Video</button>
                        `;
                        subDom.appendChild(addBox);
                    }

                    sectionDom.appendChild(subDom);
                });

                portal.appendChild(sectionDom);
            }
        }

        // --- BACKEND ROUTING WRAPPER ---
        function fetchFromDatabase(action, payloads, callback) {
            console.log("[DEBUG] Starting database request for: " + action);
            payloads.action = action;
            
            const queryString = Object.keys(payloads)
                .map(key => encodeURIComponent(key) + '=' + encodeURIComponent(payloads[key]))
                .join('&');
                
            const finalUrl = WEB_APP_URL + "?" + queryString;
            console.log("[DEBUG] Fetching URL: " + finalUrl);

            fetch(finalUrl)
                .then(res => {
                    if (!res.ok) throw new Error("HTTP Status Error " + res.status);
                    return res.json();
                })
                .then(data => {
                    console.log("[DEBUG] Server Response: ", data);
                    if (data && data.success) {
                        if (callback) {
                            callback(data);
                        } else if (action !== "login") {
                            location.reload();
                        }
                    } else {
                        console.error("[DEBUG] Google Apps Script flagged error:", data.error);
                    }
                })
                .catch(err => {
                    console.error("[DEBUG] Network Catch Error Triggered: ", err);
                    // Fail-safe layout activation for initial configuration steps
                    if (action === "login") {
                        console.log("[DEBUG] Activating local fallback layout mock dashboard.");
                        callback({ 
                            success: true, 
                            role: payloads.id.toString().length === 5 ? "coach" : "player", 
                            videos: [], 
                            roster: [], 
                            assignments: [] 
                        });
                    }
                });
        }

        // --- INTERACTIVE ACTIONS ---
        function trackWatchEvent(videoId) {
            if (sessionUser.role === "player") {
                let playerNum = localStorage.getItem("jerseyNumber") || sessionUser.id;
                
                let tag = document.getElementById("tag-" + videoId);
                if (tag) tag.style.display = "none";

                fetchFromDatabase("watchVideo", { jersey: playerNum, videoId: videoId });
            }
        }

        function triggerAssignmentRoutine(videoId) {
            let options = cachedRoster.map(p => "#" + p.jerseyNumber + " - " + p.playerName).join("\n");
            let targetJersey = prompt("Enter player jersey number to assign this clip:\n\nAvailable Roster:\n" + options);
            
            if (targetJersey) {
                fetchFromDatabase("assignVideo", { jerseyNumber: targetJersey.trim(), videoId: videoId });
                alert("Assignment request sent for player #" + targetJersey);
            }
        }

        function executeAddVideo(sec, sub) {
            let textId = "title-" + sec.replace(/\s+/g, '') + "-" + sub.replace(/\s+/g, '');
            let urlId = "url-" + sec.replace(/\s+/g, '') + "-" + sub.replace(/\s+/g, '');
            
            let titleVal = document.getElementById(textId).value;
            let urlVal = document.getElementById(urlId).value;

            if (!titleVal || !urlVal) {
                alert("Both title and video link fields are required.");
                return;
            }
            fetchFromDatabase("addVideo", { section: sec, subsection: sub, title: titleVal, youtubeUrl: urlVal });
        }

        function executeSoftDelete(videoId) {
            if (confirm("Are you sure you want to remove this video from the player panel?")) {
                fetchFromDatabase("deleteVideo", { videoId: videoId });
            }
        }
    </script>
</body>
</html>
